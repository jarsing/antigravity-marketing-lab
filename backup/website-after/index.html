<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>彰化端午小旅行</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">彰化肉圓小旅行</div>
    <nav>
      <a href="#spots">附近散步</a>
      <a href="#line">LINE 資訊</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-text">
        <p class="eyebrow">端午連假｜彰化市區</p>
        <h1>端午來彰化，帶孩子吃肉圓散步去</h1>
        <p class="lead">端午連假帶孩子來彰化，從一顆熱騰騰的肉圓開始，順路探索附近適合親子散步的小角落。</p>
        <a class="cta" href="#line">加入 LINE 取得散步資訊</a>
      </div>
      <div class="hero-card">
        <div class="circle">肉圓</div>
        <p>美食 × 散步 × 小旅行</p>
      </div>
    </section>

    <section id="spots" class="spots">
      <h2>附近可以順路走走</h2>
      <div class="cards">
        <article><h3>老街散步</h3><p>吃完肉圓後，安排一段輕鬆的街區漫步。</p></article>
        <article><h3>親子拍照</h3><p>找一個好拍、好停留的小角落。</p></article>
        <article><h3>在地小吃</h3><p>把一餐變成一段小旅行。</p></article>
      </div>
    </section>

    <section id="line" class="line-box">
      <h2>LINE 散步資訊</h2>
      <p>加入 LINE 官方帳號，取得附近散步資訊。</p>
    </section>
  </main>

  <footer>
    <p>Demo website for GDG Changhua Antigravity Marketing Lab.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
